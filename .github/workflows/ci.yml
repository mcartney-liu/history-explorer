name: CI

# History Explorer — M8.6 Engineering Foundation Cleanup
# Automated quality gate. Replaces the previously human-only
# vitest / tsc / vite build / freeze-scan discipline.
#
# Triggers:
#   - pull_request  -> master   (proposed changes validated before merge)
#   - push          -> master   (post-merge regression guard)
#
# Merge protection (set on GitHub, not in this file):
#   Require status checks (all three jobs) to pass.
#   Require branches to be up to date before merge.
#   Disable direct push to master (force the feature-branch + --no-ff flow).

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (typecheck + test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run build

  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Run tests
        run: python -m pytest -q

  freeze-check:
    name: Freeze Guard (M3.5)
    runs-on: ubuntu-latest
    env:
      FROZEN_SCOPE: frontend
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Run freeze guard
        run: node scripts/freeze-check.mjs
