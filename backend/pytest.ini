[pytest]
# History Explorer backend test config (M3.5-003).
#
# The only warning the suite otherwise emits is the upstream
# `starlette.exceptions.StarletteDeprecationWarning` ("Using `httpx` with
# `starlette.testclient` is deprecated"). It is a known starlette/httpx version
# interaction raised on import of FastAPI's TestClient, carries no product
# signal, and is unrelated to M3.5-003. The filter is scoped to that single
# warning class so genuine warnings are NOT masked.
filterwarnings =
    ignore::starlette.exceptions.StarletteDeprecationWarning
